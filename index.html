<style>
  :root {
    --bg-dark: #050505;
    --bg-darker: #020202;
    --accent: #f5f0e8;
    --accent-soft: #f0ebe3;
    --button-bg: #ffffff;
    --button-text: #111111;
    --text-main: #f7f7f7;
    --text-muted: #c1c1c1;
    --nav-height: 72px;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html,
  body {
    height: 100%;
    scroll-behavior: smooth;
  }

  body {
    font-family: "Cormorant Garamond", system-ui, -apple-system, BlinkMacSystemFont,
      "Segoe UI", serif;
    background-color: var(--bg-dark);
    color: var(--text-main);
  }

  a {
    color: inherit;
    text-decoration: none;
  }

  /* NAVBAR */

  .navbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: var(--nav-height);
    background: rgba(0, 0, 0, 0.95);
    display: flex;
    align-items: center;
    padding: 0 32px;
    z-index: 100;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(10px);
  }

  .nav-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-mark {
    width: 42px;
    height: 42px;
    border-radius: 999px;
    border: 2px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 1px;
  }

  .logo-text {
    font-size: 18px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* HERO */

  .hero {
    position: relative;
    min-height: 100vh;
    padding-top: var(--nav-height);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    background-image: url("assets/citylights.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  .hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 15% 10%, rgba(255, 255, 255, 0.08), transparent 55%),
      linear-gradient(to bottom, rgba(0, 0, 0, 0.68), rgba(0, 0, 0, 0.96));
  }

  .hero-inner {
    position: relative;
    max-width: 960px;
    padding: 32px 28px 48px;
  }

  .hero-title {
    font-size: clamp(38px, 4.8vw, 60px);
    line-height: 1.05;
    margin-bottom: 20px;
    letter-spacing: 0.03em;
  }

  .hero-subtitle {
    font-size: 20px;
    font-weight: 400;
    color: var(--accent-soft);
    margin-bottom: 20px;
  }

  .hero-body {
    font-size: 18px;
    font-weight: 300;
    color: var(--accent-soft);
    margin: 16px auto 20px;
    line-height: 1.7;
    max-width: 760px;
  }

  .hero-section-heading {
    font-size: 24px;
    font-weight: 600;
    margin: 34px 0 14px;
    text-align: left;
    color: var(--text-main);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .hero-bullets,
  .hero-steps,
  .hero-bullets-tight {
    text-align: left;
    margin: 10px auto 22px;
    max-width: 760px;
    color: var(--accent-soft);
    font-size: 16px;
    font-weight: 300;
    line-height: 1.65;
    padding-left: 20px;
  }

  .hero-bullets li,
  .hero-bullets-tight li,
  .hero-steps li {
    margin: 5px 0;
  }

  .hero-steps {
    color: #d5d4d2; /* soft silver */
  }

  .hero-actions {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 18px;
    margin-top: 28px;
  }

  .btn-primary {
    padding: 13px 30px;
    border-radius: 999px;
    background: var(--button-bg);
    color: var(--button-text);
    border: none;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    box-shadow: 0 10px 26px rgba(0, 0, 0, 0.4);
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 14px 32px rgba(0, 0, 0, 0.55);
    background: #f7f7f7;
  }

  .btn-ghost {
    padding: 13px 26px;
    border-radius: 999px;
    background: rgba(0, 0, 0, 0.25);
    border: 1px solid rgba(255, 255, 255, 0.85);
    color: #ffffff;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .btn-ghost:hover {
    background: rgba(255, 255, 255, 0.15);
    border-color: #ffffff;
  }

  /* BELOW SECTION */

  .below {
    background: var(--bg-darker);
    padding: 60px 24px 72px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
  }

  .below-inner {
    max-width: 960px;
    margin: 0 auto;
  }

  /* DISCLAIMER (if you add one later) */

  .disclaimer {
    background: var(--bg-darker);
    color: var(--text-muted);
    padding: 32px 24px 48px;
    font-size: 11px;
    line-height: 1.6;
  }

  .disclaimer-inner {
    max-width: 1120px;
    margin: 0 auto;
  }

  .disclaimer h4 {
    color: #f0f0f0;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 10px;
  }

  .disclaimer p + p {
    margin-top: 8px;
  }

  @media (max-width: 768px) {
    .navbar {
      padding: 0 16px;
    }

    .logo-text {
      font-size: 16px;
      letter-spacing: 0.1em;
    }

    .hero-inner {
      padding: 24px 18px 40px;
    }

    .hero-title {
      font-size: 30px;
    }

    .hero-section-heading {
      font-size: 20px;
      text-align: left;
    }

    .hero-body {
      font-size: 17px;
    }

    .hero-bullets,
    .hero-steps,
    .hero-bullets-tight {
      font-size: 15px;
    }
  }
</style>
